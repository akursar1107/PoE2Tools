<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PoE2 Quick Reference</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-copy">
      <p class="eyebrow">PoE2 Tools</p>
      <h1>Quick Reference Wiki</h1>
      <p class="subtitle">
        A three-pane field guide for fast browsing across ascendancies, skill gems, and support gems.
      </p>
    </div>
    <a class="back-link" href="../">Back to tools</a>
  </header>

  <main class="shell">
    <aside class="sidebar" aria-label="Reference navigation">
      <section class="sidebar-panel">
        <div class="sidebar-panel-header">
          <p class="sidebar-label">Sections</p>
        </div>
        <nav id="sectionNav" class="section-nav" aria-label="Top-level sections"></nav>
      </section>

      <section class="sidebar-panel">
        <div class="sidebar-panel-header">
          <p class="sidebar-label">Groups</p>
          <p id="groupMeta" class="sidebar-meta"></p>
        </div>
        <nav id="groupNav" class="group-nav" aria-label="Section groups"></nav>
      </section>

      <section class="sidebar-panel sidebar-filters">
        <div class="sidebar-panel-header">
          <p class="sidebar-label">Search & Filters</p>
        </div>
        <input id="searchInput" type="search" placeholder="Search by name, tag, or passive..." />
        <div class="tag-bar" id="tagBar" aria-label="Theme filters"></div>
      </section>

      <section class="sidebar-panel sidebar-items">
        <div class="sidebar-panel-header">
          <p class="sidebar-label">Entries</p>
          <p id="itemMeta" class="sidebar-meta"></p>
        </div>
        <nav id="itemNav" class="item-nav" aria-label="Entries in the selected group"></nav>
      </section>
    </aside>

    <section class="content-pane">
      <div id="results" class="results" aria-live="polite"></div>
    </section>
  </main>

  <script type="module" src="app.mjs"></script>
</body>
</html>

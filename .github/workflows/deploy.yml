name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build relic-optimizer
        working-directory: relic-optimizer
        run: |
          npm install
          npm run build

      - name: Assemble site
        run: |
          mkdir -p _site/picker
          mkdir -p _site/wiki/data
          mkdir -p _site/wiki/lib
          mkdir -p _site/relic-optimizer
          cp index.html _site/
          cp -r picker/. _site/picker/
          cp wiki/index.html _site/wiki/
          cp wiki/style.css _site/wiki/
          cp wiki/app.mjs _site/wiki/
          cp wiki/data/*.mjs _site/wiki/data/
          cp wiki/lib/wiki-data.mjs _site/wiki/lib/
          cp -r relic-optimizer/dist/. _site/relic-optimizer/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

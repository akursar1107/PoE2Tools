<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PoE2 Build Randomizer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div style="display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
      <h1>PoE2 Build Randomizer</h1>
      <button id="muteBtn" class="mute-btn" title="Toggle Sound" aria-label="Toggle Sound">🔊</button>
    </div>
    <p class="subtitle">Not sure what to play? Let fate decide.</p>
  </header>

  <main>
    <button id="rollBtn">Roll Build</button>

    <section id="spinnerContainer" class="spinner-container hidden" aria-live="polite">
      <!-- Ascendancy Spinner Column -->
      <div class="spinner-column">
        <span class="column-label">Ascendancy</span>
        <div class="spinner-viewport" id="ascendancyViewport">
          <div class="clicker-indicator" id="ascendancyClicker"></div>
          <div class="spinner-strip" id="ascendancyStrip"></div>
          <div class="spinner-overlay"></div>
        </div>
        <span class="class-tag" id="classTag"></span>
      </div>

      <!-- Skill Gem Spinner Column -->
      <div class="spinner-column">
        <span class="column-label">Skill Gem</span>
        <div class="spinner-viewport" id="skillViewport">
          <div class="clicker-indicator" id="skillClicker"></div>
          <div class="spinner-strip" id="skillStrip"></div>
          <div class="spinner-overlay"></div>
        </div>
        <div id="skillTags" class="skill-tags"></div>
      </div>
    </section>

    <button id="downloadBtn" class="download-btn hidden">⬇ Download .build file</button>

    <section id="historySection" class="hidden">
      <div class="history-header">
        <h2>Roll History</h2>
        <button id="clearBtn" class="clear-btn">Clear</button>
      </div>
      <ul id="historyList"></ul>
    </section>
  </main>

  <script type="module" src="app.mjs"></script>
</body>
</html>
